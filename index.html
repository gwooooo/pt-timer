<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>물리치료실 타이머</title>
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PT 타이머">
<meta name="theme-color" content="#0f1117">
<link rel="manifest" id="pwaManifest">
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&family=JetBrains+Mono:wght@500;700;800&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
  --bg:#0f1117;--surface:#181d2a;--surface2:#1e2333;--border:#252d42;
  --green:#22c55e;--green-g:rgba(34,197,94,.15);
  --amber:#f59e0b;--amber-g:rgba(245,158,11,.18);
  --red:#ef4444;--red-g:rgba(239,68,68,.22);
  --blue:#3b82f6;--blue-g:rgba(59,130,246,.15);
  --violet:#a78bfa;--violet-g:rgba(167,139,250,.18);
  --orange:#fb923c;--orange-g:rgba(251,146,60,.18);
  --text:#e8eaf0;--muted:#4e5a78;--muted2:#2e3650;
  --traction-accent:#10b981;--traction-g:rgba(16,185,129,.18);
  --cpm-lt-accent:#a78bfa;--cpm-rt-accent:#fb923c;--cpm-accent:#a78bfa;
}

html,body{
  height:100%;
  /* 아이폰 사파리 주소창 포함 문제 해결 */
  height:100dvh;
  overflow:hidden;
}
body{
  background:var(--bg);font-family:'Noto Sans KR',sans-serif;
  color:var(--text);display:flex;flex-direction:column;
  padding:env(safe-area-inset-top,6px) 7px env(safe-area-inset-bottom,5px);
  padding-top:max(env(safe-area-inset-top),6px);
  padding-bottom:max(env(safe-area-inset-bottom),4px);
  gap:4px;
  box-sizing:border-box;
}

/* ── Header ── */
header{display:flex;align-items:center;justify-content:space-between;flex-shrink:0;padding:0 2px}
header h1{font-size:.82rem;font-weight:700;color:#fff;letter-spacing:-.01em}
header h1 span{color:var(--blue)}
.clock{font-size:.72rem;color:var(--muted);font-family:'JetBrains Mono',monospace;letter-spacing:.05em}

/* ── Main: left | center-queue | right ── */
.main{
  flex:1;min-height:0;
  display:grid;
  grid-template-columns:1fr 6px 88px 6px 1fr;
  gap:0;
}
.col-div{background:var(--border);border-radius:3px}

/* ── Room columns ── */
.room-col{display:flex;flex-direction:column;gap:3px;overflow:hidden;padding:0 4px}

/* ── Room Card — flex:1로 화면 높이에 맞게 균등 분배 ── */
.room-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:9px;
  padding:4px 8px 6px;cursor:pointer;user-select:none;
  position:relative;overflow:hidden;
  flex:1;          /* 균등 분배 */
  min-height:0;    /* flex 자식이 줄어들 수 있도록 */
  display:flex;flex-direction:column;justify-content:space-between;
  transition:border-color .2s,box-shadow .2s;
}
.room-card::before{
  content:'';position:absolute;inset:0;border-radius:inherit;
  opacity:0;transition:opacity .3s;pointer-events:none;
}
.room-card.idle:hover{border-color:var(--blue);box-shadow:0 0 0 2px var(--blue-g)}
.room-card.running{border-color:var(--green);box-shadow:0 0 0 2px var(--green-g)}
.room-card.running::before{background:radial-gradient(ellipse at bottom left,var(--green-g),transparent 65%);opacity:1}
.room-card.warning{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-g)}
.room-card.warning::before{background:radial-gradient(ellipse at bottom left,var(--amber-g),transparent 65%);opacity:1}
.room-card.done{border-color:var(--red);box-shadow:0 0 0 3px var(--red-g);animation:pulse 1.2s ease-in-out infinite}
.room-card.done::before{background:radial-gradient(ellipse at bottom left,var(--red-g),transparent 65%);opacity:1}
@keyframes pulse{0%,100%{box-shadow:0 0 0 2px var(--red-g)}50%{box-shadow:0 0 0 6px rgba(239,68,68,.07)}}

/* CPM pill */
.room-card.cpm-lt{border-radius:28px;border-color:#3d3060;background:linear-gradient(135deg,#1c1428,#181d2a)}
.room-card.cpm-lt.running{border-color:var(--violet);box-shadow:0 0 0 2px var(--violet-g)}
.room-card.cpm-lt.warning{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-g)}
.room-card.cpm-lt.done{border-color:var(--red);animation:pulse 1.2s ease-in-out infinite}
.room-card.cpm-rt{border-radius:28px;border-color:#4a2e0e;background:linear-gradient(135deg,#1c1208,#181d2a)}
.room-card.cpm-rt.running{border-color:var(--orange);box-shadow:0 0 0 2px var(--orange-g)}
.room-card.cpm-rt.warning{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-g)}
.room-card.cpm-rt.done{border-color:var(--red);animation:pulse 1.2s ease-in-out infinite}

/* Traction — 다이아몬드 모서리 */
.room-card.traction{
  border-radius:6px 18px 6px 18px;
  border-color:#0d6e52;
  background:linear-gradient(135deg,#0d1f1a,#181d2a);
}
.room-card.traction.running{border-color:var(--traction-accent);box-shadow:0 0 0 2px var(--traction-g)}
.room-card.traction.warning{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber-g)}
.room-card.traction.done{border-color:var(--red);animation:pulse 1.2s ease-in-out infinite}
.traction.running .card-badge{background:rgba(16,185,129,.14);color:var(--traction-accent)}
.traction.running .card-endtime{color:#6ee7b7}
.traction.running .card-remain{color:var(--traction-accent)}
.traction.running .card-treat{color:rgba(16,185,129,.7)}
.traction.running .card-prog-fill{background:var(--traction-accent)}
.traction.warning .card-prog-fill{background:var(--amber)}
.card-treat{
  font-size:.5rem;font-weight:700;letter-spacing:.04em;
  color:var(--muted);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  line-height:1;
}
.running .card-treat{color:rgba(34,197,94,.7)}
.warning .card-treat{color:rgba(245,158,11,.7)}
.done .card-treat{color:rgba(239,68,68,.6)}
.cpm-lt.running .card-treat{color:rgba(167,139,250,.7)}
.cpm-rt.running .card-treat{color:rgba(251,146,60,.7)}

/* Card top row: label + badge */
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:2px}
.card-num{font-size:.58rem;font-weight:700;color:var(--muted);letter-spacing:.03em;line-height:1}
.card-num b{font-size:.78rem;color:var(--text);font-weight:900}
.card-cpm-name{display:flex;flex-direction:column;gap:0}
.card-cpm-name .cpm-side{font-size:.8rem;font-weight:900;color:var(--text);line-height:1}
.card-cpm-name .cpm-sub{font-size:.48rem;color:var(--muted);font-weight:600;letter-spacing:.02em}

.card-badge{
  font-size:.42rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  padding:1px 4px;border-radius:20px;background:var(--muted2);color:var(--muted);
  flex-shrink:0;
}
.running .card-badge{background:rgba(34,197,94,.14);color:var(--green)}
.warning .card-badge{background:rgba(245,158,11,.16);color:var(--amber)}
.done .card-badge{background:rgba(239,68,68,.18);color:var(--red)}
.cpm-lt.running .card-badge{background:rgba(167,139,250,.14);color:var(--violet)}
.cpm-rt.running .card-badge{background:rgba(251,146,60,.14);color:var(--orange)}

/* Card bottom: 종료시각(왼쪽 작게) + 남은시간(오른쪽 크게) */
.card-times{display:flex;align-items:baseline;justify-content:flex-end;gap:5px}

/* 남은시간 — 크게 오른쪽 */
.card-remain{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(1rem, 3.2vw, 1.4rem);font-weight:800;
  color:var(--muted2);letter-spacing:.02em;line-height:1;
}
.running .card-remain{color:var(--green)}
.warning .card-remain{color:var(--amber)}
.done .card-remain{color:var(--red)}
.cpm-lt.running .card-remain{color:var(--violet)}
.cpm-rt.running .card-remain{color:var(--orange)}
.traction.running .card-remain{color:var(--traction-accent)}

/* 종료시각 — 중간 크기 왼쪽 */
.card-endtime{
  font-family:'JetBrains Mono',monospace;
  font-size:clamp(.75rem, 2.2vw, 1rem);font-weight:700;
  color:var(--muted);letter-spacing:.02em;
  transition:color .3s;line-height:1;
}
.idle .card-endtime{color:var(--muted2)}
.running .card-endtime{color:rgba(255,255,255,.5)}
.warning .card-endtime{color:rgba(255,255,255,.5)}
.done .card-endtime{color:rgba(239,68,68,.7)}

/* progress */
.card-prog{position:absolute;bottom:0;left:0;right:0;height:2px;background:var(--muted2)}
.card-prog-fill{height:100%;background:var(--muted2);transition:width .95s linear,background .3s}
.running .card-prog-fill{background:var(--green)}
.warning .card-prog-fill{background:var(--amber)}
.done .card-prog-fill{background:var(--red);width:0!important}
.cpm-lt.running .card-prog-fill{background:var(--violet)}
.cpm-rt.running .card-prog-fill{background:var(--orange)}

/* CPM section label */
.col-section-label{
  font-size:.5rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted2);padding:2px 0 1px 3px;
}

/* ── Queue (center) ── */
.queue-col{
  display:flex;flex-direction:column;
  padding:0 5px;overflow:hidden;
}
.queue-title{
  font-size:.52rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:4px;flex-shrink:0;text-align:center;
}
.queue-list{display:flex;flex-direction:column;gap:3px;overflow-y:auto;flex:1}
.queue-list::-webkit-scrollbar{width:2px}
.queue-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.queue-empty{font-size:.52rem;color:var(--muted2);text-align:center;padding-top:10px;line-height:1.7}

.queue-item{
  border:1.5px solid var(--red);border-radius:7px;
  background:rgba(239,68,68,.08);
  padding:4px 5px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:1px;
  animation:pulse 1.5s ease-in-out infinite;
  transition:opacity .15s;
}
.queue-item:active{opacity:.6}
/* 진행중 항목 — 만료와 구분 */
.queue-item.queue-item-running{
  border-color:var(--border);background:var(--surface);
  animation:none;cursor:default;
}
.queue-item-rank{
  font-size:.46rem;font-weight:700;letter-spacing:.04em;
  color:rgba(239,68,68,.55);
}
.queue-item-running .queue-item-rank{color:var(--muted)}
.queue-item-num{font-size:.62rem;font-weight:900;color:var(--red);text-align:center;line-height:1.1}
.queue-item-running .queue-item-num{color:var(--text)}
.queue-item-time{
  font-family:'JetBrains Mono',monospace;
  font-size:.58rem;font-weight:700;
  color:rgba(239,68,68,.65);
}
.queue-item-running .queue-item-time{color:var(--green)}

/* ── Modal ── */
.modal-overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.78);backdrop-filter:blur(5px);
  z-index:100;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--surface2);border:1.5px solid var(--border);border-radius:18px;
  padding:22px 18px 18px;width:100%;max-width:300px;
  animation:modalIn .2s cubic-bezier(.34,1.56,.64,1);
}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(8px)}to{opacity:1;transform:scale(1)}}
.modal h2{font-size:.95rem;font-weight:700;margin-bottom:3px;color:#fff}
.modal p{font-size:.72rem;color:var(--muted);margin-bottom:14px}
.time-options{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.time-btn{
  background:var(--surface);border:1.5px solid var(--border);border-radius:11px;
  padding:12px 6px;cursor:pointer;color:var(--text);
  font-family:'JetBrains Mono',monospace;font-size:1.3rem;font-weight:800;
  display:flex;flex-direction:column;align-items:center;gap:2px;
  transition:border-color .15s,background .15s,transform .1s;
}
.time-btn:hover{border-color:var(--blue);background:rgba(59,130,246,.08);transform:translateY(-2px)}
.time-btn span{font-family:'Noto Sans KR',sans-serif;font-size:.58rem;font-weight:500;color:var(--muted)}
/* 편집 모드 버튼 */
.time-btn.editing{border-color:var(--amber);background:rgba(245,158,11,.08);position:relative}
.time-btn .edit-hint{
  position:absolute;top:4px;right:5px;font-size:.42rem;color:var(--amber);
  font-family:'Noto Sans KR',sans-serif;font-weight:700;letter-spacing:.03em;
}
.edit-mode-tip{
  font-size:.6rem;color:var(--amber);text-align:center;
  margin:-4px 0 8px;font-weight:600;
}
/* 편집 팝업 */
.edit-popup{
  display:none;position:fixed;inset:0;z-index:200;
  align-items:center;justify-content:center;
  background:rgba(0,0,0,.6);backdrop-filter:blur(4px);
}
.edit-popup.open{display:flex}
.edit-box{
  background:var(--surface2);border:1.5px solid var(--amber);border-radius:16px;
  padding:20px 18px 16px;width:260px;
  animation:modalIn .2s cubic-bezier(.34,1.56,.64,1);
}
.edit-box h3{font-size:.88rem;font-weight:700;color:var(--amber);margin-bottom:12px}
.edit-row{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.edit-row label{font-size:.65rem;color:var(--muted);font-weight:600}
.edit-field{
  background:var(--surface);border:1.5px solid var(--border);border-radius:8px;
  padding:7px 10px;color:var(--text);font-family:'Noto Sans KR',sans-serif;
  font-size:.85rem;font-weight:600;width:100%;outline:none;
  transition:border-color .15s;
}
.edit-field:focus{border-color:var(--amber)}
.edit-actions{display:flex;gap:7px;margin-top:4px}
.btn-edit-save{
  flex:1;padding:9px;border-radius:9px;
  border:1.5px solid var(--amber);background:rgba(245,158,11,.12);
  color:var(--amber);font-family:'Noto Sans KR',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;
}
.btn-edit-cancel{
  flex:1;padding:9px;border-radius:9px;
  border:1.5px solid var(--border);background:transparent;
  color:var(--muted);font-family:'Noto Sans KR',sans-serif;
  font-size:.78rem;font-weight:600;cursor:pointer;
}

/* 드래그 슬라이더 */
.custom-divider{display:flex;align-items:center;gap:7px;margin:8px 0}
.custom-divider-line{flex:1;height:1px;background:var(--border)}
.custom-divider-label{font-size:.58rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
.drag-slider-wrap{
  display:flex;align-items:center;gap:10px;margin-bottom:12px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:9px;
  padding:6px 10px;transition:border-color .15s;
}
.drag-slider-wrap:active,.drag-slider-wrap.dragging{border-color:var(--blue)}
.drag-value{
  font-family:'JetBrains Mono',monospace;font-size:1.5rem;font-weight:800;
  color:var(--text);min-width:2.2ch;text-align:center;flex-shrink:0;
}
.drag-unit{font-size:.65rem;color:var(--muted);flex-shrink:0}
.drag-track{
  flex:1;height:36px;position:relative;cursor:ew-resize;
  display:flex;align-items:center;touch-action:none;
}
.drag-bar-bg{
  position:absolute;left:0;right:0;height:4px;
  background:var(--border);border-radius:99px;
}
.drag-bar-fill{
  position:absolute;left:0;height:4px;
  background:var(--blue);border-radius:99px;transition:width .05s;
}
.drag-thumb{
  position:absolute;width:18px;height:18px;background:#fff;border-radius:50%;
  box-shadow:0 1px 4px rgba(0,0,0,.4);transform:translateX(-50%);
  transition:left .05s;
}
.drag-hint{font-size:.5rem;color:var(--muted);text-align:center;margin-bottom:6px}
.drag-start-btn{
  height:38px;padding:0 14px;border-radius:9px;
  border:1.5px solid var(--blue);background:rgba(59,130,246,.12);
  color:var(--blue);font-family:'Noto Sans KR',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;
  transition:background .15s;flex-shrink:0;
}
.drag-start-btn:hover{background:rgba(59,130,246,.22)}
.vib-toggle{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 11px;background:var(--surface);border-radius:9px;
  border:1px solid var(--border);margin-bottom:10px;cursor:pointer;
}
.vib-toggle label{font-size:.74rem;color:var(--text);cursor:pointer;display:flex;align-items:center;gap:6px}
.vib-toggle label::before{content:'📳';font-size:.85rem}
.switch{width:32px;height:17px;background:var(--border);border-radius:20px;position:relative;transition:background .2s;flex-shrink:0;cursor:pointer}
.switch.on{background:var(--green)}
.switch::after{content:'';position:absolute;width:11px;height:11px;background:#fff;border-radius:50%;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.switch.on::after{left:18px}
.modal-actions{display:flex;gap:7px}
.btn-cancel,.btn-stop{
  flex:1;padding:9px;border-radius:9px;border:1.5px solid var(--border);
  background:transparent;color:var(--muted);
  font-family:'Noto Sans KR',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;
  transition:border-color .15s,color .15s;
}
.btn-cancel:hover{border-color:var(--muted);color:var(--text)}
.btn-stop{border-color:rgba(239,68,68,.4);color:var(--red)}
.btn-stop:hover{border-color:var(--red);background:rgba(239,68,68,.08)}
.done-banner{
  background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
  border-radius:9px;padding:8px;margin-bottom:12px;
  font-size:.74rem;color:var(--red);text-align:center;font-weight:600;
}
</style>
</head>
<body>

<header>
  <h1>⚡ <span>PT</span> 전기치료 타이머</h1>
  <div class="clock" id="clockDisplay"></div>
</header>

<div class="main">
  <div class="room-col" id="leftCol"></div>
  <div class="col-div"></div>
  <!-- 가운데 만료 순서 -->
  <div class="queue-col">
    <div class="queue-title">⏰ 만료 순서</div>
    <div class="queue-list" id="queueList">
      <div class="queue-empty" id="queueEmpty">만료된<br>방 없음</div>
    </div>
  </div>
  <div class="col-div"></div>
  <div class="room-col" id="rightCol"></div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle"></h2>
    <p id="modalSubtitle">치료 시간을 선택하세요</p>
    <div class="done-banner" id="doneBanner" style="display:none">⏰ 치료 시간 완료!</div>
    <div class="time-options" id="timeOptions"></div>
    <div class="edit-mode-tip" id="editTip" style="display:none">✏️ 버튼을 탭하여 편집하세요</div>
    <div style="display:flex;justify-content:flex-end;margin:-4px 0 8px">
      <button onclick="toggleEditMode()" id="editModeBtn"
        style="background:none;border:none;font-size:.6rem;color:var(--muted);cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:600;padding:2px 4px">
        ✏️ 버튼 편집
      </button>
    </div>
    <div class="custom-divider">
      <div class="custom-divider-line"></div>
      <div class="custom-divider-label">직접 설정</div>
      <div class="custom-divider-line"></div>
    </div>
    <div class="drag-hint">← 좌우로 드래그하여 시간 조절 →</div>
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px">
      <div class="drag-slider-wrap" style="flex:1">
        <div class="drag-value" id="dragValue">10</div>
        <div class="drag-unit">분</div>
        <div class="drag-track" id="dragTrack">
          <div class="drag-bar-bg"></div>
          <div class="drag-bar-fill" id="dragFill"></div>
          <div class="drag-thumb" id="dragThumb"></div>
        </div>
      </div>
      <button class="drag-start-btn" onclick="startDragTimer()">시작</button>
    </div>
    <div class="vib-toggle" onclick="toggleVibration()">
      <label>진동 알림</label>
      <div class="switch" id="vibSwitch"></div>

<script>
const LEFT_ROOMS  = [13, 12, 11, 10, 'tr-9', 'tr-8', 'lt-cpm', 'rt-cpm'];
const RIGHT_ROOMS = [15, 16, 17, 19, 20, 21, 22, 23, 25, 26, 27, 29];
const ALL_ROOMS   = [...LEFT_ROOMS, ...RIGHT_ROOMS];
const TRACTION_ROOMS = ['tr-8', 'tr-9'];
const ROOM_LABEL  = {
  'lt-cpm':{ short:'Lt', sub:'Shoulder CPM', cls:'cpm-lt' },
  'rt-cpm':{ short:'Rt', sub:'Shoulder CPM', cls:'cpm-rt' },
  'tr-8':  { short:'8', sub:'Traction', cls:'traction' },
  'tr-9':  { short:'9', sub:'Traction', cls:'traction' },
};
const WARN_SECS = 60;

// ── 고정 타이머 버튼 설정 (localStorage 저장) ──
const BTN_STORAGE_KEY = 'pt_timer_btns_v1';
const DEFAULT_BTNS = [
  { min: 14, label: 'ICT치료' },
  { min: 15, label: '핫팩' },
  { min: 19, label: 'TENS패치' },
  { min: 20, label: '기타' },
];
function loadBtns(){
  try { return JSON.parse(localStorage.getItem(BTN_STORAGE_KEY)) || DEFAULT_BTNS; } catch(e){ return DEFAULT_BTNS; }
}
function saveBtns(btns){ try { localStorage.setItem(BTN_STORAGE_KEY, JSON.stringify(btns)); } catch(e){} }

let timerBtns = loadBtns();
let editMode = false;
let editingIdx = null;

// 분 → 치료 라벨 (동적으로 버튼에서 찾음)
function getTreatLabel(minutes){
  const btn = timerBtns.find(b => b.min === minutes);
  return btn ? btn.label : `${minutes}분`;
}

function renderTimerBtns(){
  const wrap = document.getElementById('timeOptions');
  wrap.innerHTML = '';
  timerBtns.forEach((btn, i) => {
    const el = document.createElement('button');
    el.className = 'time-btn' + (editMode ? ' editing' : '');
    el.innerHTML = `${btn.min}<span>분 · ${btn.label}</span>${editMode ? '<div class="edit-hint">탭하여 편집</div>' : ''}`;
    if(editMode){
      el.onclick = () => openEditPopup(i);
    } else {
      el.onclick = () => startTimer(btn.min, btn.label);
    }
    wrap.appendChild(el);
  });
  document.getElementById('editTip').style.display = editMode ? 'block' : 'none';
  document.getElementById('editModeBtn').textContent = editMode ? '✅ 편집 완료' : '✏️ 버튼 편집';
}

function toggleEditMode(){
  editMode = !editMode;
  renderTimerBtns();
}

function openEditPopup(idx){
  editingIdx = idx;
  const btn = timerBtns[idx];
  document.getElementById('editMinField').value = btn.min;
  document.getElementById('editLabelField').value = btn.label;
  document.getElementById('editPopup').dataset.mode = 'normal';
  document.getElementById('editPopup').classList.add('open');
}
function closeEditPopup(){
  document.getElementById('editPopup').classList.remove('open');
  editingIdx = null; trEditingIdx = null;
}

// ── 드래그 슬라이더 ──
const DRAG_MIN = 1, DRAG_MAX = 60;
let dragVal = 10;
let dragStartX = null, dragStartVal = null;

function setDragVal(v){
  dragVal = Math.min(DRAG_MAX, Math.max(DRAG_MIN, Math.round(v)));
  const pct = (dragVal - DRAG_MIN) / (DRAG_MAX - DRAG_MIN);
  document.getElementById('dragValue').textContent = dragVal;
  document.getElementById('dragFill').style.width = (pct * 100) + '%';
  document.getElementById('dragThumb').style.left = (pct * 100) + '%';
}

function initDragSlider(){
  const track = document.getElementById('dragTrack');
  const wrap  = track.closest('.drag-slider-wrap');

  function getClientX(e){ return e.touches ? e.touches[0].clientX : e.clientX; }
  function onStart(e){
    e.preventDefault();
    dragStartX = getClientX(e);
    dragStartVal = dragVal;
    wrap.classList.add('dragging');
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
  }
  function onMove(e){
    if(dragStartX === null) return;
    e.preventDefault();
    const dx = getClientX(e) - dragStartX;
    // 트랙 너비 기준으로 스케일
    const trackW = track.getBoundingClientRect().width || 120;
    const delta = (dx / trackW) * (DRAG_MAX - DRAG_MIN);
    setDragVal(dragStartVal + delta);
  }
  function onEnd(){
    dragStartX = null; dragStartVal = null;
    wrap.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchend', onEnd);
  }
  track.addEventListener('mousedown', onStart);
  track.addEventListener('touchstart', onStart, { passive: false });
  setDragVal(10);
}

function startDragTimer(){ startTimer(dragVal, `${dragVal}분`); }

const state = {};
ALL_ROOMS.forEach(id=>{
  state[id]={ endEpoch:null, totalSecs:0, overSecs:0, treatLabel:'', status:'idle', rafId:null, vibIntervalId:null };
});

let vibrationOn=true, currentRoom=null, notifPermission=false;
const doneQueue=[];

// PWA
(function(){
  const m={name:"물리치료실 전기치료 타이머",short_name:"PT 타이머",start_url:"./",
    display:"standalone",background_color:"#0f1117",theme_color:"#0f1117",orientation:"portrait",
    icons:[{src:"data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect width='192' height='192' rx='32' fill='%230f1117'/><text x='96' y='130' font-size='110' text-anchor='middle'>⚡</text></svg>",sizes:"192x192",type:"image/svg+xml"}]};
  document.getElementById('pwaManifest').href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/json'}));
})();

// 알림 권한
(async function(){
  if(!('Notification' in window)) return;
  if(Notification.permission==='granted'){notifPermission=true;return;}
  if(Notification.permission!=='denied'){notifPermission=(await Notification.requestPermission())==='granted';}
})();

// 시계
setInterval(()=>{
  const n=new Date();
  document.getElementById('clockDisplay').textContent=
    `${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}`;
},1000);

// ── 빌드 ──
function buildCol(colId, rooms){
  const col=document.getElementById(colId);
  col.innerHTML='';
  rooms.forEach(id=>{
    if(id==='tr-9'){
      const lbl=document.createElement('div');
      lbl.className='col-section-label';
      lbl.style.color='var(--traction-accent)';
      lbl.textContent='── Traction';
      col.appendChild(lbl);
    }
    if(id==='lt-cpm'){
      const lbl=document.createElement('div');
      lbl.className='col-section-label';
      lbl.textContent='── CPM';
      col.appendChild(lbl);
    }
    const info=ROOM_LABEL[id];
    const card=document.createElement('div');
    card.className=`room-card idle${info?' '+info.cls:''}`;
    card.id=`room-${id}`;
    card.onclick=()=>onCardClick(id);

    const topLeft = info
      ? `<div class="card-cpm-name"><span class="cpm-side">${info.short}</span><span class="cpm-sub">${info.sub}</span></div>`
      : `<div class="card-num">치료실 <b>${id}</b></div>`;

    card.innerHTML=`
      <div class="card-top">
        ${topLeft}
        <div class="card-badge" id="badge-${id}">대기</div>
      </div>
      <div class="card-treat" id="treat-${id}"></div>
      <div class="card-times">
        <div class="card-endtime" id="end-${id}"></div>
        <div class="card-remain" id="remain-${id}">--:--</div>
      </div>
      <div class="card-prog"><div class="card-prog-fill" id="prog-${id}" style="width:100%"></div></div>
    `;
    col.appendChild(card);
  });
}

const CPM_ROOMS = ['lt-cpm', 'rt-cpm'];

function onCardClick(id){
  if(state[id].status==='done'){ dismissRoom(id); return; }
  if(TRACTION_ROOMS.includes(id)) openTractionModal(id);
  else if(CPM_ROOMS.includes(id)) openCpmModal(id);
  else openModal(id);
}

// ── localStorage 저장/복구 ──
const STORAGE_KEY = 'pt_timer_state_v1';

function saveState(){
  try {
    const data = {};
    ALL_ROOMS.forEach(id => {
      const s = state[id];
      if(s.status !== 'idle' && s.endEpoch){
        data[id] = { endEpoch: s.endEpoch, totalSecs: s.totalSecs, treatLabel: s.treatLabel };
      }
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e){}
}

function restoreState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if(!raw) return;
    const data = JSON.parse(raw);
    const now = Date.now();
    ALL_ROOMS.forEach(id => {
      if(!data[id]) return;
      const { endEpoch, totalSecs, treatLabel } = data[id];
      const s = state[id];
      s.endEpoch   = endEpoch;
      s.totalSecs  = totalSecs;
      s.treatLabel = treatLabel || '';
      if(now >= endEpoch){
        // 이미 만료됨
        s.status   = 'done';
        s.overSecs = Math.floor((now - endEpoch) / 1000);
      } else {
        s.status   = (endEpoch - now) / 1000 <= WARN_SECS ? 'warning' : 'running';
        s.overSecs = 0;
      }
      tickRoom(id);
      updateCard(id);
    });
    renderQueue();
  } catch(e){}
}

// ── 타이머 시작 ──
function startTimer(minutes, label){
  if(currentRoom===null) return;
  const id=currentRoom, s=state[id];
  clearRoomTimers(s);
  s.totalSecs=minutes*60;
  s.endEpoch=Date.now()+s.totalSecs*1000;
  s.overSecs=0;
  s.treatLabel = label || getTreatLabel(minutes);
  s.status='running';
  tickRoom(id);
  saveState();
  closeModal();
}
function stepCustom(d){ void d; } // legacy no-op

// ── CPM 전용 모달 ──
const CPM_BTN_KEY = 'pt_timer_cpm_btns_v1';
const CPM_DEFAULT_BTNS = [{ min: 20, label: 'CPM' }];
function loadCpmBtns(){ try { return JSON.parse(localStorage.getItem(CPM_BTN_KEY)) || CPM_DEFAULT_BTNS; } catch(e){ return CPM_DEFAULT_BTNS; } }
function saveCpmBtns(b){ try { localStorage.setItem(CPM_BTN_KEY, JSON.stringify(b)); } catch(e){} }

let cpmBtns = loadCpmBtns();
let cpmEditMode = false;
let cpmEditingIdx = null;
let cpmDragVal = 20;
let currentCpmId = null;

function getCpmAccent(id){ return id==='lt-cpm' ? 'var(--cpm-lt-accent)' : 'var(--cpm-rt-accent)'; }

function renderCpmBtns(id){
  const wrap = document.getElementById('cpmTimeOptions');
  wrap.innerHTML = '';
  wrap.style.gridTemplateColumns = cpmBtns.length === 1 ? '1fr' : '1fr 1fr';
  const accent = getCpmAccent(id || currentCpmId);
  cpmBtns.forEach((btn, i) => {
    const el = document.createElement('button');
    el.className = 'time-btn' + (cpmEditMode ? ' editing' : '');
    el.style.borderColor = cpmEditMode ? 'var(--amber)' : accent;
    el.style.background = cpmEditMode ? 'rgba(245,158,11,.08)' : (id||currentCpmId)==='lt-cpm' ? 'rgba(167,139,250,.08)' : 'rgba(251,146,60,.08)';
    el.innerHTML = `${btn.min}<span>분 · ${btn.label}</span>${cpmEditMode ? '<div class="edit-hint">탭하여 편집</div>' : ''}`;
    if(cpmEditMode){
      el.onclick = () => openCpmEditPopup(i);
    } else {
      el.onclick = () => startCpmTimer(btn.min, btn.label);
    }
    wrap.appendChild(el);
  });
  // 드래그 슬라이더 색상도 맞춤
  const fill = document.getElementById('cpmDragFill');
  const wrap2 = document.getElementById('cpmDragWrap');
  const startBtn = document.getElementById('cpmDragStartBtn');
  if(fill) fill.style.background = accent;
  if(wrap2) wrap2.style.borderColor = accent;
  if(startBtn){ startBtn.style.borderColor = accent; startBtn.style.color = accent; startBtn.style.background = (id||currentCpmId)==='lt-cpm' ? 'rgba(167,139,250,.1)' : 'rgba(251,146,60,.1)'; }
  document.getElementById('cpmEditTip').style.display = cpmEditMode ? 'block' : 'none';
  document.getElementById('cpmEditModeBtn').textContent = cpmEditMode ? '✅ 편집 완료' : '✏️ 버튼 편집';
}

function toggleCpmEditMode(){ cpmEditMode=!cpmEditMode; renderCpmBtns(); }

function openCpmEditPopup(idx){
  cpmEditingIdx = idx;
  const btn = cpmBtns[idx];
  document.getElementById('editMinField').value = btn.min;
  document.getElementById('editLabelField').value = btn.label;
  document.getElementById('editPopup').dataset.mode = 'cpm';
  document.getElementById('editPopup').classList.add('open');
}

function openCpmModal(id){
  currentCpmId = id;
  currentRoom = id;
  const s = state[id];
  const isLt = id === 'lt-cpm';
  document.getElementById('cpmTitle').textContent = isLt ? 'Lt Shoulder CPM' : 'Rt Shoulder CPM';
  document.getElementById('cpmTitle').style.color = getCpmAccent(id);
  const stopBtn = document.getElementById('cpmStopBtn');
  const sub = document.getElementById('cpmSubtitle');
  document.getElementById('cpmDoneBanner').style.display='none';
  if(s.status==='running'||s.status==='warning'){
    sub.textContent='진행중 — 새 시간 선택 시 재시작됩니다';
    stopBtn.textContent='타이머 중지'; stopBtn.style.display='block';
  } else {
    sub.textContent='치료 시간을 선택하세요'; stopBtn.style.display='none';
  }
  cpmEditMode = false;
  renderCpmBtns(id);
  updateVibSwitch();
  document.getElementById('cpmOverlay').classList.add('open');
}
function closeCpmModal(){
  document.getElementById('cpmOverlay').classList.remove('open');
  currentRoom=null; currentCpmId=null;
}
document.getElementById('cpmOverlay').addEventListener('click',function(e){
  if(e.target===this) closeCpmModal();
});
function startCpmTimer(minutes, label){
  startTimer(minutes, label || 'CPM');
  document.getElementById('cpmOverlay').classList.remove('open');
}
function startCpmDragTimer(){ startCpmTimer(cpmDragVal, `${cpmDragVal}분`); }
function stopCpmTimer(){ if(currentRoom===null) return; dismissRoom(currentRoom); closeCpmModal(); }

// CPM 드래그 슬라이더
(function(){
  const track = document.getElementById('cpmDragTrack');
  if(!track) return;
  let startX=null, startV=null;
  function setV(v){
    cpmDragVal=Math.min(99,Math.max(1,Math.round(v)));
    const pct=(cpmDragVal-1)/98;
    document.getElementById('cpmDragValue').textContent=cpmDragVal;
    document.getElementById('cpmDragFill').style.width=(pct*100)+'%';
    document.getElementById('cpmDragThumb').style.left=(pct*100)+'%';
  }
  function cx(e){ return e.touches?e.touches[0].clientX:e.clientX; }
  function onS(e){ e.preventDefault(); startX=cx(e); startV=cpmDragVal;
    document.addEventListener('mousemove',onM); document.addEventListener('touchmove',onM,{passive:false});
    document.addEventListener('mouseup',onE); document.addEventListener('touchend',onE); }
  function onM(e){ if(startX===null)return; e.preventDefault();
    const tw=track.getBoundingClientRect().width||120;
    setV(startV+(cx(e)-startX)/tw*98); }
  function onE(){ startX=null; document.removeEventListener('mousemove',onM);
    document.removeEventListener('touchmove',onM); document.removeEventListener('mouseup',onE);
    document.removeEventListener('touchend',onE); }
  track.addEventListener('mousedown',onS);
  track.addEventListener('touchstart',onS,{passive:false});
  setV(20);
})();
const TR_BTN_KEY = 'pt_timer_tr_btns_v1';
const TR_DEFAULT_BTNS = [
  { min: 13, label: 'Traction' },
];
function loadTrBtns(){ try { return JSON.parse(localStorage.getItem(TR_BTN_KEY)) || TR_DEFAULT_BTNS; } catch(e){ return TR_DEFAULT_BTNS; } }
function saveTrBtns(b){ try { localStorage.setItem(TR_BTN_KEY, JSON.stringify(b)); } catch(e){} }

let trBtns = loadTrBtns();
let trEditMode = false;
let trEditingIdx = null;
let trDragVal = 13;

function renderTrBtns(){
  const wrap = document.getElementById('tractionTimeOptions');
  wrap.innerHTML = '';
  // 버튼 1개면 full width, 2개 이상이면 2열 그리드
  wrap.style.gridTemplateColumns = trBtns.length === 1 ? '1fr' : '1fr 1fr';
  trBtns.forEach((btn, i) => {
    const el = document.createElement('button');
    el.className = 'time-btn' + (trEditMode ? ' editing' : '');
    el.style.borderColor = trEditMode ? 'var(--amber)' : 'var(--traction-accent)';
    el.style.background = trEditMode ? 'rgba(245,158,11,.08)' : 'rgba(16,185,129,.08)';
    el.innerHTML = `${btn.min}<span>분 · ${btn.label}</span>${trEditMode ? '<div class="edit-hint">탭하여 편집</div>' : ''}`;
    if(trEditMode){
      el.onclick = () => openTrEditPopup(i);
    } else {
      el.onclick = () => startTractionTimer(btn.min, btn.label);
    }
    wrap.appendChild(el);
  });
  document.getElementById('trEditTip').style.display = trEditMode ? 'block' : 'none';
  document.getElementById('trEditModeBtn').textContent = trEditMode ? '✅ 편집 완료' : '✏️ 버튼 편집';
}

function toggleTrEditMode(){
  trEditMode = !trEditMode;
  renderTrBtns();
}

function openTrEditPopup(idx){
  trEditingIdx = idx;
  const btn = trBtns[idx];
  document.getElementById('editMinField').value = btn.min;
  document.getElementById('editLabelField').value = btn.label;
  // 저장 버튼을 traction용으로 교체
  document.getElementById('editPopup').dataset.mode = 'traction';
  document.getElementById('editPopup').classList.add('open');
}

function saveEditBtn(){
  const min = parseInt(document.getElementById('editMinField').value);
  const label = document.getElementById('editLabelField').value.trim();
  if(!min || min < 1 || !label) return;
  const mode = document.getElementById('editPopup').dataset.mode;
  if(mode === 'traction'){
    if(trEditingIdx === null) return;
    trBtns[trEditingIdx] = { min, label };
    saveTrBtns(trBtns);
    closeEditPopup();
    renderTrBtns();
  } else if(mode === 'cpm'){
    if(cpmEditingIdx === null) return;
    cpmBtns[cpmEditingIdx] = { min, label };
    saveCpmBtns(cpmBtns);
    closeEditPopup();
    renderCpmBtns();
  } else {
    if(editingIdx === null) return;
    timerBtns[editingIdx] = { min, label };
    saveBtns(timerBtns);
    closeEditPopup();
    renderTimerBtns();
  }
}

function openTractionModal(id){
  currentRoom = id;
  const s = state[id];
  document.getElementById('tractionTitle').textContent = `${id==='tr-8'?'8':'9'}번 Traction`;
  const stopBtn = document.getElementById('trStopBtn');
  const sub = document.getElementById('tractionSubtitle');
  document.getElementById('tractionDoneBanner').style.display='none';
  if(s.status==='running'||s.status==='warning'){
    sub.textContent='진행중 — 새 시간 선택 시 재시작됩니다';
    stopBtn.textContent='타이머 중지'; stopBtn.style.display='block';
  } else {
    sub.textContent='치료 시간을 선택하세요'; stopBtn.style.display='none';
  }
  trEditMode = false;
  renderTrBtns();
  updateVibSwitch();
  document.getElementById('tractionOverlay').classList.add('open');
}
function closeTractionModal(){
  document.getElementById('tractionOverlay').classList.remove('open');
  currentRoom=null;
}
document.getElementById('tractionOverlay').addEventListener('click',function(e){
  if(e.target===this) closeTractionModal();
});
function startTractionTimer(minutes, label){
  startTimer(minutes, label || 'Traction');
  document.getElementById('tractionOverlay').classList.remove('open');
}
function startTractionDragTimer(){ startTractionTimer(trDragVal); }
function stopTractionTimer(){ if(currentRoom===null) return; dismissRoom(currentRoom); closeTractionModal(); }

// Traction 드래그 슬라이더
(function(){
  const track = document.getElementById('trDragTrack');
  if(!track) return;
  let startX=null, startV=null;
  function setV(v){
    trDragVal=Math.min(60,Math.max(1,Math.round(v)));
    const pct=(trDragVal-1)/59;
    document.getElementById('trDragValue').textContent=trDragVal;
    document.getElementById('trDragFill').style.width=(pct*100)+'%';
    document.getElementById('trDragThumb').style.left=(pct*100)+'%';
  }
  function cx(e){ return e.touches?e.touches[0].clientX:e.clientX; }
  function onS(e){ e.preventDefault(); startX=cx(e); startV=trDragVal;
    document.addEventListener('mousemove',onM); document.addEventListener('touchmove',onM,{passive:false});
    document.addEventListener('mouseup',onE); document.addEventListener('touchend',onE); }
  function onM(e){ if(startX===null)return; e.preventDefault();
    const tw=track.getBoundingClientRect().width||120;
    setV(startV+(cx(e)-startX)/tw*59); }
  function onE(){ startX=null; document.removeEventListener('mousemove',onM);
    document.removeEventListener('touchmove',onM); document.removeEventListener('mouseup',onE);
    document.removeEventListener('touchend',onE); }
  track.addEventListener('mousedown',onS);
  track.addEventListener('touchstart',onS,{passive:false});
  setV(13);
})();

// ── rAF tick ──
function tickRoom(id){
  const s=state[id];
  if(s.rafId) cancelAnimationFrame(s.rafId);
  function loop(){
    const now=Date.now();
    if(s.status==='done'){
      s.overSecs=Math.floor((now-s.endEpoch)/1000);
      updateCard(id);
      s.rafId=requestAnimationFrame(loop);
      return;
    }
    const remain=Math.max(0,Math.ceil((s.endEpoch-now)/1000));
    if(remain<=0){
      s.status='done'; s.overSecs=0;
      updateCard(id); triggerDone(id);
    } else {
      s.status=remain<=WARN_SECS?'warning':'running';
      updateCard(id);
    }
    s.rafId=requestAnimationFrame(loop);
  }
  s.rafId=requestAnimationFrame(loop);
}

// ── 카드 UI ──
function updateCard(id){
  const s=state[id];
  const card=document.getElementById(`room-${id}`);
  const endEl=document.getElementById(`end-${id}`);
  const remainEl=document.getElementById(`remain-${id}`);
  const badge=document.getElementById(`badge-${id}`);
  const prog=document.getElementById(`prog-${id}`);
  const treatEl=document.getElementById(`treat-${id}`);
  const info=ROOM_LABEL[id];
  const base=info?info.cls:'';
  card.className=`room-card ${base} ${s.status}`;

  if(s.status==='idle'){
    remainEl.textContent='--:--'; endEl.textContent='';
    badge.textContent='대기'; prog.style.width='100%';
    if(treatEl) treatEl.textContent='';
    return;
  }
  // 치료 라벨
  if(treatEl) treatEl.textContent = s.treatLabel || '';
  // 종료 시각 — 작게
  if(s.endEpoch){
    const et=new Date(s.endEpoch);
    const eh=String(et.getHours()).padStart(2,'0'), em=String(et.getMinutes()).padStart(2,'0');
    endEl.textContent = s.status==='done' ? `종료 ${eh}:${em}` : `~${eh}:${em}`;
  }
  if(s.status==='done'){
    const om=Math.floor(s.overSecs/60), os=s.overSecs%60;
    remainEl.textContent=`-${String(om).padStart(2,'0')}:${String(os).padStart(2,'0')}`;
    badge.textContent='완료!'; prog.style.width='0%';
    return;
  }
  const remain=Math.max(0,Math.ceil((s.endEpoch-Date.now())/1000));
  const rm=Math.floor(remain/60), rs=remain%60;
  remainEl.textContent=`${String(rm).padStart(2,'0')}:${String(rs).padStart(2,'0')}`;
  badge.textContent=s.status==='warning'?'곧 종료':'치료중';
  prog.style.width=s.totalSecs>0?(remain/s.totalSecs*100)+'%':'0%';
}

// ── 만료 처리 ──
function triggerDone(id){
  if(vibrationOn&&navigator.vibrate) navigator.vibrate([600,200,600,200,600]);
  const lbl=getRoomLabel(id);
  if(notifPermission) new Notification(`⏰ ${lbl} 치료 완료`,{body:'터치하여 확인하세요.',requireInteraction:true,silent:false});
  if(vibrationOn&&navigator.vibrate){
    const s=state[id];
    s.vibIntervalId=setInterval(()=>{
      if(state[id].status!=='done'){clearInterval(s.vibIntervalId);return;}
      navigator.vibrate([600,200,600,200,600]);
    },5000);
  }
  renderQueue(); updateCard(id);
}

// ── 포그라운드 복귀 ──
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState!=='visible') return;
  const now=Date.now();
  ALL_ROOMS.forEach(id=>{
    const s=state[id];
    if(s.status==='idle'||!s.endEpoch) return;
    if(s.status!=='done'&&now>=s.endEpoch){
      s.status='done'; s.overSecs=Math.floor((now-s.endEpoch)/1000);
      renderQueue();
      if(vibrationOn&&navigator.vibrate) navigator.vibrate([600,200,600,200,600]);
    }
    if(s.status!=='idle') tickRoom(id);
  });
  saveState();
});

// ── 해제 ──
function dismissRoom(id){
  const s=state[id];
  clearRoomTimers(s);
  s.endEpoch=null; s.totalSecs=0; s.overSecs=0; s.treatLabel=''; s.status='idle';
  updateCard(id);
  saveState();
  renderQueue();
}
function stopCurrentTimer(){ if(currentRoom===null) return; dismissRoom(currentRoom); closeModal(); }
function clearRoomTimers(s){
  if(s.rafId) cancelAnimationFrame(s.rafId);
  if(s.vibIntervalId) clearInterval(s.vibIntervalId);
  s.rafId=null; s.vibIntervalId=null;
}

// ── 큐 렌더 (진행중 + 만료 통합, 종료시각 오름차순) ──
function renderQueue(){
  const list=document.getElementById('queueList');
  const empty=document.getElementById('queueEmpty');

  // 진행중(running/warning) + done 방 모두 수집 후 endEpoch 오름차순 정렬
  const active = ALL_ROOMS
    .filter(id => state[id].status !== 'idle' && state[id].endEpoch)
    .sort((a,b) => state[a].endEpoch - state[b].endEpoch);

  // 기존 아이템 교체
  list.querySelectorAll('.queue-item').forEach(el=>el.remove());
  empty.style.display = active.length ? 'none' : 'block';

  active.forEach((id, i) => {
    const s = state[id];
    const isDone = s.status === 'done';
    const lbl = id==='lt-cpm'?'Lt CPM':id==='rt-cpm'?'Rt CPM':id==='tr-8'?'8 Tr':id==='tr-9'?'9 Tr':`${id}번`;
    const item = document.createElement('div');
    item.className = `queue-item${isDone ? '' : ' queue-item-running'}`;
    item.id = `q-${id}`;
    if(isDone) item.onclick = () => dismissRoom(id);

    const et = new Date(s.endEpoch);
    const etStr = `${String(et.getHours()).padStart(2,'0')}:${String(et.getMinutes()).padStart(2,'0')}`;

    item.innerHTML = `
      <div class="queue-item-rank">${i+1}</div>
      <div class="queue-item-num">${lbl}</div>
      <div class="queue-item-time" id="qtime-${id}">${isDone ? '완료' : etStr}</div>
    `;
    list.appendChild(item);
  });
}

// 1초마다 큐 갱신 (남은시간 변화 + 순서 재정렬)
setInterval(renderQueue, 1000);

// ── Modal ──
function openModal(id){
  if(state[id].status==='done'){dismissRoom(id);return;}
  currentRoom=id;
  const s=state[id];
  document.getElementById('modalTitle').textContent=getRoomLabel(id);
  const stopBtn=document.getElementById('stopBtn');
  const sub=document.getElementById('modalSubtitle');
  document.getElementById('doneBanner').style.display='none';
  if(s.status==='running'||s.status==='warning'){
    sub.textContent='진행중 — 새 시간 선택 시 재시작됩니다';
    stopBtn.textContent='타이머 중지'; stopBtn.style.display='block';
  } else {
    sub.textContent='치료 시간을 선택하세요'; stopBtn.style.display='none';
  }
  updateVibSwitch();
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal(){ document.getElementById('modalOverlay').classList.remove('open'); currentRoom=null; }
document.getElementById('modalOverlay').addEventListener('click',function(e){if(e.target===this)closeModal();});
function getRoomLabel(id){
  if(id==='lt-cpm') return 'Lt Shoulder CPM';
  if(id==='rt-cpm') return 'Rt Shoulder CPM';
  if(id==='tr-8') return '8번 Traction';
  if(id==='tr-9') return '9번 Traction';
  return `${id}번 치료실`;
}
function toggleVibration(){ vibrationOn=!vibrationOn; updateVibSwitch(); }
function updateVibSwitch(){
  const on = vibrationOn?' on':'';
  document.getElementById('vibSwitch').className='switch'+on;
  const sw2=document.getElementById('vibSwitch2');
  if(sw2) sw2.className='switch'+on;
  const sw3=document.getElementById('vibSwitch3');
  if(sw3) sw3.className='switch'+on;
}
updateVibSwitch();

// ── 초기 렌더 ──
buildCol('leftCol', LEFT_ROOMS);
buildCol('rightCol', RIGHT_ROOMS);
renderTimerBtns();
renderTrBtns();
renderCpmBtns('lt-cpm');
initDragSlider();

// ── 페이지 로드 시 상태 복구 ──
restoreState();
</script>
